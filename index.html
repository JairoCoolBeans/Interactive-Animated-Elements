<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<link rel="stylesheet" href="style.css">
  
  <header>
    <h1>🐣 Happy Easter! 🐰</h1>
    <p>Egg-cited for Easter! </p>
  </header>

  <section class="card-container">

    <div class="card">
      <img src="https://pbs.twimg.com/media/GJ8C7ZwaIAAYFRa.jpg" alt="image">
      <p>Sonic celebrates Easter!</p>
    </div>

    <div class="card">
      <img src="https://www.rd.com/wp-content/uploads/2025/02/The-History-Behind-17-Popular-Easter-Traditions_GettyImages-2072350017.jpg" alt="image">
      <p>Fill up those baskets!</p>
    </div>

    <div class="card">
      <img src="https://www.farmersalmanac.com/wp-content/uploads/2020/11/Easter-bunny-history-lore-i513792274.jpeg" alt="image">
      <p>What a cute Bunny!</p>
    </div>

  </section>

  <button class="main-btn">GO find those eggs!</button>

  <footer>
    <p>The Easter Bunny awaits!</p>
  </footer>

</body>
</html>
